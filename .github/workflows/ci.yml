name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests y analisis de seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Arquitectura

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Arquitectura/frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Verificar importacion de la aplicacion
        run: python -c "from run import app; print('Aplicacion importada correctamente')"

      - name: Analisis de seguridad con Bandit
        run: |
          pip install bandit
          bandit -r . -ll -ii --exclude ./.venv,./venv,./__pycache__,./frontend/node_modules
