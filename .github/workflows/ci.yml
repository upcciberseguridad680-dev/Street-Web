name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests y analisis de seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Arquitectura

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Arquitectura/frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Verificar importacion de la aplicacion
        run: python -c "from run import app; print('Aplicacion importada correctamente')"

      - name: Analisis de seguridad con Bandit
        run: |
          pip install bandit
          bandit -r . -ll -ii --exclude ./.venv,./venv,./__pycache__,./frontend/node_modules

      - name: Desplegar en Developer Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.SECRET_DEVELOPER }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::Falta configurar el secret SECRET_DEVELOPER con el Deploy Hook de Render."
            exit 1
          fi

          case "$RENDER_DEPLOY_HOOK" in
            http://*|https://*) ;;
            *)
              echo "::error::El secret SECRET_DEVELOPER debe ser una URL valida de Render."
              exit 1
              ;;
          esac

          curl --fail --show-error --silent "$RENDER_DEPLOY_HOOK"

      - name: Desplegar en Production Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.SECRET_PRODUCTION }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::Falta configurar el secret SECRET_PRODUCTION con el Deploy Hook de Render."
            exit 1
          fi

          case "$RENDER_DEPLOY_HOOK" in
            http://*|https://*) ;;
            *)
              echo "::error::El secret SECRET_PRODUCTION debe ser una URL valida de Render."
              exit 1
              ;;
          esac

          curl --fail --show-error --silent "$RENDER_DEPLOY_HOOK"
